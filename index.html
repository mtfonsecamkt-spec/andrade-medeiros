<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Andrade Medeiros — Advocacia e Assessoria Jurídica</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body, 'Inter', sans-serif);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.55;
  }
  :root {
    /* navy palette (default) */
    --navy-900: #0e1a2b;
    --navy-800: #14223a;
    --navy-700: #1a2942;
    --navy-600: #243456;
    --navy-500: #3a4a6e;
    --navy-100: #e8ecf3;
    --cream: #faf7f2;
    --paper: #ffffff;
    --warm-100: #f3ede2;
    --gold: #b89968;
    --gold-soft: #cbb085;
    --ink: #1a2030;
    --ink-soft: #4a536b;
    --rule: rgba(20, 34, 58, 0.12);

    /* theme tokens (overridden by tweaks) */
    --bg: var(--cream);
    --surface: var(--paper);
    --accent: var(--navy-800);
    --accent-2: var(--gold);
    --on-accent: #ffffff;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'Inter', sans-serif;

    /* density */
    --section-pad-y: 120px;
    --container: 1200px;
    --gutter: 28px;
  }

  body.dark {
    --bg: #0b1322;
    --surface: #121d33;
    --ink: #e7ecf5;
    --ink-soft: #aab4c8;
    --rule: rgba(255,255,255,0.10);
    --paper: #121d33;
    --warm-100: #1a2942;
    --navy-100: #1f2c47;
  }

  /* ------------- Mobile responsive ------------- */
  @media (max-width: 1100px) {
    :root { --section-pad-y: 96px; --gutter: 24px; }
  }
  @media (max-width: 768px) {
    :root { --section-pad-y: 72px; --gutter: 20px; }
    .h1 { font-size: clamp(36px, 8vw, 56px) !important; }
    .h2 { font-size: clamp(28px, 6vw, 42px) !important; }
    .h3 { font-size: clamp(22px, 4vw, 28px) !important; }
    .display em { font-size: 0.95em; }
    .btn { padding: 14px 20px !important; font-size: 14px !important; }
  }
  @media (max-width: 480px) {
    :root { --section-pad-y: 56px; --gutter: 16px; }
    .container { padding: 0 16px !important; }
  }

  a { color: inherit; }
  img { display: block; max-width: 100%; }
  button { font: inherit; cursor: pointer; }

  .container {
    max-width: var(--container);
    margin: 0 auto;
    padding: 0 var(--gutter);
  }

  section { padding: var(--section-pad-y) 0; }

  .eyebrow {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--accent-2);
    margin: 0 0 18px 0;
  }
  .display {
    font-family: var(--font-display);
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.05;
    margin: 0;
    color: var(--ink);
    text-wrap: balance;
  }
  .h1 { font-size: clamp(44px, 6vw, 84px); }
  .h2 { font-size: clamp(36px, 4.4vw, 60px); }
  .h3 { font-size: clamp(24px, 2vw, 32px); }
  .lede {
    font-size: clamp(17px, 1.2vw, 19px);
    color: var(--ink-soft);
    max-width: 60ch;
    text-wrap: pretty;
  }

  /* ---------- buttons ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 26px;
    border-radius: 999px;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.01em;
    text-decoration: none;
    border: 1px solid transparent;
    transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--on-accent);
    box-shadow: 0 10px 30px -12px rgba(20, 34, 58, 0.45);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 18px 36px -12px rgba(20, 34, 58, 0.55); }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border-color: var(--rule);
  }
  .btn-ghost:hover { border-color: var(--ink); }
  .btn-wa {
    background: #25D366;
    color: #0c2a16;
    font-weight: 600;
  }
  .btn-wa:hover { background: #1fbf5b; transform: translateY(-2px); }

  /* ---------- rule ornament ---------- */
  .rule-ornament {
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--accent-2);
  }
  .rule-ornament::before, .rule-ornament::after {
    content: '';
    flex: 1;
    height: 1px;
    background: currentColor;
    opacity: 0.4;
  }
  .rule-ornament .diamond {
    width: 6px; height: 6px;
    transform: rotate(45deg);
    background: currentColor;
  }

  /* tighten density */
  body.dense { --section-pad-y: 72px; --gutter: 22px; }
  body.airy { --section-pad-y: 160px; }

  /* hide chrome until React mounts */
  #root:empty::before {
    content: '';
    display: block;
    height: 100vh;
    background:
      radial-gradient(circle at 50% 40%, rgba(184, 153, 104, 0.08), transparent 60%),
      var(--bg);
  }
</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" fill="#0e1a2b"/>
      <g transform="translate(100 100)" fill="#cbb085" text-anchor="middle">
        <text y="-6" font-family="Cormorant Garamond, serif" font-size="42" font-weight="600" letter-spacing="3">AM</text>
        <text y="22" font-family="system-ui, sans-serif" font-size="9" letter-spacing="3">ADVOCACIA</text>
      </g>
      <rect x="48" y="48" width="104" height="104" fill="none" stroke="#cbb085" stroke-width="0.6"/>
    </svg>
  </template>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- image-slot web component for drop-in photos -->
  <script src="image-slot.js"></script>

  <!-- Imagens embutidas em base64 (carrega antes do JSX) -->
  <script src="images.js"></script>

  <!-- Tweaks panel + sections -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="brand.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
